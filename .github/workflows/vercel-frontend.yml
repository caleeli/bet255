# Required GitHub Actions configuration:
# - Secret: VERCEL_TOKEN
# - Variables: VERCEL_ORG_ID, VERCEL_PROJECT_ID
# See docs/vercel-deployment.md for where to find these values.
name: Deploy frontend to Vercel

on:
  push:
    branches:
      - main
      - master
    paths:
      - frontend/**
      - vercel.json
      - .github/workflows/vercel-frontend.yml
  workflow_dispatch:

concurrency:
  group: vercel-frontend-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy production frontend
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel project output
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
